<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex Studio — AEO Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-bg-grid"></div>
  <div class="login-bg-glow"></div>

  <div class="login-container">
    <div class="login-card card">

      <div class="login-brand">
        <span class="login-logo">Vertex<span style="color:var(--accent)">Studio</span></span>
        <span class="login-product-label">AEO &amp; GEO Visibility Dashboard</span>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div id="loginError" class="login-error" hidden></div>

        <button type="submit" class="btn btn--primary btn--full" style="padding: 12px;">
          Sign In
        </button>
      </form>

      <div class="demo-credentials">
        <span class="section-label">Demo credentials</span>
        <code>demo@vertexstudio.tech</code>
        <code>demo123</code>
      </div>

    </div>

    <p class="login-footer">Protected client portal &mdash; Vertex Studio &copy; 2026</p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
